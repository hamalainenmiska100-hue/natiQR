name: Build iOS IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect project
        run: |
          PROJECT=$(ls *.xcodeproj | head -n 1)
          echo "PROJECT=$PROJECT" >> $GITHUB_ENV
          echo "Project: $PROJECT"

      - name: Detect target
        run: |
          TARGET=$(xcodebuild -list -project "$PROJECT" | grep -A1 "Targets:" | tail -n1 | xargs)
          echo "TARGET=$TARGET" >> $GITHUB_ENV
          echo "Target: $TARGET"

      - name: Build archive (unsigned)
        run: |
          xcodebuild \
          -project "$PROJECT" \
          -target "$TARGET" \
          -configuration Release \
          -sdk iphoneos \
          -destination 'generic/platform=iOS' \
          -archivePath build/App.xcarchive \
          archive \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_IDENTITY=""

      - name: Create IPA
        run: |
          mkdir Payload
          cp -r build/App.xcarchive/Products/Applications/*.app Payload/
          zip -r App.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: App.ipa
