name: Build iOS IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build archive (unsigned)
        run: |
          xcodebuild \
            -project NativeQR.xcodeproj \
            -scheme NativeQR \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath build/NativeQR.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Create Payload folder
        run: |
          mkdir Payload
          cp -r build/NativeQR.xcarchive/Products/Applications/*.app Payload/

      - name: Create IPA
        run: |
          zip -r NativeQR.ipa Payload

      - name: Create TIPA
        run: |
          cp NativeQR.ipa NativeQR.tipa

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: |
            NativeQR.ipa
            NativeQR.tipa
